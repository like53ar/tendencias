<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenCryptoAnalytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .splash-card {
            background: rgba(22, 27, 34, 0.98);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 380px;
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }
        .logo span { color: #58a6ff; text-shadow: 0 0 15px rgba(88, 166, 255, 0.4); }

        .status-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 0.5rem;
        }

        .sub-text {
            font-size: 0.85rem;
            color: #8b949e;
            line-height: 1.5;
        }

        .loader {
            width: 100%;
            height: 4px;
            background: #161b22;
            border-radius: 2px;
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .loader-bar {
            position: absolute;
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #58a6ff, #bc8eff);
            border-radius: 2px;
            animation: loading 2.5s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -30%; width: 30%; }
            50% { width: 50%; }
            100% { left: 100%; width: 30%; }
        }

        .footer-note {
            font-size: 0.7rem;
            color: #484f58;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="splash-card">
        <div class="logo">ZenCrypto<span>Analytics</span></div>
        <div class="status-text">Iniciando Ecosistema Zen...</div>
        <div class="sub-text">Levantando servidores de datos y compilando modelos estadísticos.</div>
        
        <div class="loader">
            <div class="loader-bar"></div>
        </div>

        <div class="footer-note">v.1.0 professional suite</div>
    </div>

    <script>
        window.resizeTo(450, 320);
    </script>
</body>
</html>
